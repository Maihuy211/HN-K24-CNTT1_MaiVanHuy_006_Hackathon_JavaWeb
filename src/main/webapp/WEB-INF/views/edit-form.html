<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<div layout:fragment="content" class="d-flex justify-content-center align-items-center">
    <form method="post" th:object="${flightForm}" th:action="@{/flights/edit/{id}(id=*{id})}" enctype="multipart/form-data">
        <h4 class="text-center">Flight Form</h4>
        <div class="form-group" >
            <label>ID</label>
            <input type="text"
                   class="form-control" name="" id="" aria-describedby="helpId" placeholder="" th:field="*{id}" readonly>
            <small class="text-danger" th:if="${#fields.hasErrors('id')}" th:errors="*{id}"></small>
        </div>
        <div class="form-group" >
            <label>Flight Number</label>
            <input type="text"
                   class="form-control" name="" id="" aria-describedby="helpId" placeholder="" th:field="*{flightNumber}">
            <small class="text-danger" th:if="${#fields.hasErrors('flightNumber')}" th:errors="*{flightNumber}"></small>
        </div>
        <div class="form-group" >
            <label>Destination</label>
            <input type="text"
                   class="form-control" name="" id="" aria-describedby="helpId" placeholder="" th:field="*{destination}">
            <small class="text-danger" th:if="${#fields.hasErrors('destination')}" th:errors="*{destination}"></small>
        </div>
        <div class="form-group" >
            <label>Departure Time</label>
            <input type="date"
                   class="form-control" name="" id="" aria-describedby="helpId" placeholder="" th:field="*{departureTime}">
            <small class="text-danger" th:if="${#fields.hasErrors('departureTime')}" th:errors="*{departureTime}"></small>
        </div>
        <div class="form-group" >
            <label>Ticket Price</label>
            <input type="number"
                   class="form-control" name="" id="" aria-describedby="helpId" placeholder="" th:field="*{ticketPrice}">
            <small class="text-danger" th:if="${#fields.hasErrors('ticketPrice')}" th:errors="*{ticketPrice}"></small>
        </div>
        <div class="form-group" >
            <label>Logo</label>
            <input type="hidden" name="currentLogo" th:value="${oldLogo}">
            <input type="file"
                   class="form-control" name="" id="" aria-describedby="helpId" placeholder="" th:field="*{airlineLogo}">
            <small class="text-danger" th:if="${#fields.hasErrors('airlineLogo')}" th:errors="*{airlineLogo}"></small>
        </div>
        <button type="submit" class="btn btn-primary">Sửa</button>
    </form>
    </form>
</div>
<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
